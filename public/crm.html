<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lumea — Hotel Fountain CRM</title>
  <link rel="icon" href="/favicon.ico" sizes="any"/>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏨</text></svg>" type="image/svg+xml"/>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
        html,body,#root{height:100%;background:#1C1510;overflow:hidden;margin:0}
    #loading{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#1C1510;flex-direction:column;gap:16px;z-index:9999}
    #loading h1{font-family:'Libre Baskerville',Georgia,serif;font-size:36px;color:#C8A96E;font-weight:700;letter-spacing:.02em}
    #loading h1 em{font-style:italic;font-weight:400}
    #loading p{color:rgba(200,169,110,.45);font-size:9px;letter-spacing:.22em;text-transform:uppercase;font-family:'DM Sans',system-ui,sans-serif}
    .spin{width:20px;height:20px;border:2px solid rgba(200,169,110,.2);border-top-color:#C8A96E;border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <div id="loading"><h1><em>Lumea</em></h1><div class="spin"></div><p>Hotel Fountain CRM</p></div>
  <div id="root" style="height:100%"></div>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="/crm-config.js"></script>
  <script src="/crm-bundle.js?v=20260517034755"></script>
</body>
</html>
