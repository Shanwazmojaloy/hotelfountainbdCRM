<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Hotel Fountain | Official Site — Luxury In Comfort</title>
<meta name="description" content="Welcome to Hotel Fountain. Premium Hospitality in Dhaka. Offering luxury rooms: Fountain Deluxe, Premium Deluxe, Superior Deluxe, Twin Deluxe & Royal Suite."/>
<meta property="og:title" content="Hotel Fountain — Luxury In Comfort"/>
<meta property="og:image" content="https://raw.githubusercontent.com/Shanwazmojaloy/hotelfountainbdCRM/main/Pictures/Front%20View.jpg"/>
<link rel="icon" href="https://raw.githubusercontent.com/Shanwazmojaloy/hotelfountainbdCRM/main/Pictures/Logo.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Jost:wght@200;300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--gold:#C8A96E;--gold2:#D9BE8A;--bg:#07090E;--s1:#0C0E13;--tx:#EEE9E2;--tx2:rgba(238,233,226,.58);--tx3:rgba(238,233,226,.32);--br2:rgba(238,233,226,.07);--serif:'Playfair Display',Georgia,serif;--sans:'Jost',sans-serif}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--tx);font-family:var(--sans);font-weight:300}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--gold);border-radius:2px}
@keyframes mIn{from{opacity:0;transform:translateY(14px) scale(.97)}to{opacity:1;transform:none}}
.au{opacity:0;transform:translateY(22px);transition:opacity .75s ease,transform .75s ease}.au.vis{opacity:1;transform:none}
.rcard:hover .rh{transform:scale(1.06)!important}
input,select,textarea{background:rgba(200,169,110,.04);border:1px solid rgba(238,233,226,.1);color:var(--tx);font-family:var(--sans);font-weight:300;outline:none;transition:border-color .2s;color-scheme:dark;border-radius:0}
input:focus,select:focus,textarea:focus{border-color:rgba(200,169,110,.42)}
select option{background:#0C0E13;color:#EEE9E2}
input::placeholder,textarea::placeholder{color:rgba(238,233,226,.28)}
input[type=date]{color-scheme:dark}
@media(max-width:900px){.rooms-g{grid-template-columns:repeat(2,1fr)!important}.two-c{grid-template-columns:1fr!important}.stats-g{grid-template-columns:1fr 1fr!important}.avail-g{grid-template-columns:1fr 1fr!important}.nav-links{display:none!important}.sec-pad{padding:64px 24px!important}.hero-c{padding:110px 24px 60px!important}}
@media(max-width:580px){.rooms-g{grid-template-columns:1fr!important}.avail-g{grid-template-columns:1fr!important}.stats-g{grid-template-columns:1fr 1fr!important}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect}=React;

/* ── Config ── */
const R="https://raw.githubusercontent.com/Shanwazmojaloy/hotelfountainbdCRM/main/Pictures";
const PIC={logo:`${R}/Logo.png`,hero:`${R}/Front%20View.jpg`,1:`${R}/Fountain%20Deluxe.jpeg`,2:`${R}/Premium%20Deluxe.jpg`,3:`${R}/Superior%20Deluxe.jpeg`,4:`${R}/Twin%20Deluxe.jpg`,5:`${R}/Royal%20Suite.jpeg`};
const SB_URL="https://bgqsorvxbytttrvbjder.supabase.co";
const SB_KEY="sb_publishable_8D7Iz6QAoF2N7e8yqyiJ9g_1jlz77Lb";
const CRM="https://fountainbd.com/crm.html";

/* ── Room data ── */
const ROOMS=[
  {id:1,name:"Fountain Deluxe",cap:2,price:4000,badge:"FOUNTAIN DELUXE",bc:"rgba(0,210,195,.15)",bt:"#00D2C3",grad:"linear-gradient(160deg,#0E1B2A,#071018)",desc:"Elegant room for two with premium air conditioning and round-the-clock front desk support.",tags:["Air Conditioning","Front Desk 24/7","24/7 Room Service"]},
  {id:2,name:"Premium Deluxe",cap:2,price:4500,badge:"PREMIUM DELUXE",bc:"rgba(80,120,255,.15)",bt:"#5882FF",grad:"linear-gradient(160deg,#0E1830,#071525)",desc:"Refined comfort for two with complimentary breakfast and curated room amenities.",tags:["Room Heating","High Speed Wi-Fi","24/7 Room Service","Front Office"]},
  {id:3,name:"Superior Deluxe",cap:2,price:5000,badge:"SUPERIOR DELUXE",bc:"rgba(60,88,200,.15)",bt:"#6888D8",grad:"linear-gradient(160deg,#0A1530,#060E20)",desc:"Superior appointments for two, featuring complimentary breakfast and premium connectivity.",tags:["Complimentary Breakfast","Premium Connectivity","24/7 Room Service"]},
  {id:4,name:"Twin Deluxe",cap:4,price:6000,badge:"TWIN DELUXE",bc:"rgba(200,169,110,.15)",bt:"#C8A96E",grad:"linear-gradient(160deg,#1C1508,#100E04)",desc:"Spacious twin-bed suite for four, ideal for families or colleagues travelling together.",tags:["Twin Beds","High Speed Wi-Fi","24/7 Room Service"]},
  {id:5,name:"Royal Suite",cap:8,price:5000,badge:"ROYAL SUITE",bc:"rgba(200,110,50,.15)",bt:"#E08850",grad:"linear-gradient(160deg,#1C1005,#100902)",desc:"Our crown jewel — an expansive suite with panoramic views and bespoke concierge service.",tags:["Panoramic Views","Bespoke Service","VIP Lounge","Butler"]},
];

/* ── Components ── */
const MapPin=({size=14,color="currentColor"})=><svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth={1.8} strokeLinecap="round" strokeLinejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>;
const Phone=({size=14,color="currentColor"})=><svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth={1.8} strokeLinecap="round" strokeLinejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 1.27h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 8.91a16 16 0 0 0 6 6l1-1.06a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>;
const Mail=({size=14,color="currentColor"})=><svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth={1.8} strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>;
const Clock=({size=14,color="currentColor"})=><svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth={1.8} strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>;

const em={fontStyle:"italic",color:"var(--gold)"};
const lbl={fontFamily:"var(--sans)",fontSize:9.5,letterSpacing:".22em",textTransform:"uppercase",color:"var(--gold)",fontWeight:300,display:"block",marginBottom:12};
const h2s={fontFamily:"var(--serif)",fontSize:"clamp(32px,4vw,52px)",fontWeight:400,letterSpacing:"-.5px",lineHeight:1.05};
const gBtn={background:"var(--gold)",color:"#07090E",border:"none",padding:"12px 26px",fontSize:10,letterSpacing:".2em",textTransform:"uppercase",fontFamily:"var(--sans)",fontWeight:500,cursor:"pointer",display:"inline-flex",alignItems:"center",gap:8,transition:"background .18s"};
const ghBtn={background:"transparent",color:"var(--tx)",border:"1px solid rgba(238,233,226,.22)",padding:"12px 26px",fontSize:10,letterSpacing:".2em",textTransform:"uppercase",fontFamily:"var(--sans)",fontWeight:300,cursor:"pointer",display:"inline-flex",alignItems:"center",gap:8,transition:"all .18s"};
const inp={width:"100%",padding:"10px 13px",fontSize:13,fontFamily:"var(--sans)",fontWeight:300};
const imgF={position:"absolute",top:0,left:0,width:"100%",height:"100%",objectFit:"cover",display:"block"};
const hide=e=>{e.currentTarget.style.display="none"};
const fmt=d=>new Date(d).toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"}).replace(/ /g,"-");

function App(){
  const [sc,setSc]=useState(false);
  const [ci,setCi]=useState(()=>new Date().toISOString().split("T")[0]);
  const [co,setCo]=useState(()=>{const d=new Date();d.setDate(d.getDate()+2);return d.toISOString().split("T")[0]});
  const [rt,setRt]=useState("any");
  const [gs,setGs]=useState("2");
  const [res,setRes]=useState(null);
  const [chk,setChk]=useState(false);
  const [form,setForm]=useState({name:"",email:"",phone:"",message:""});
  const [sent,setSent]=useState(false);

  useEffect(()=>{
    const h=()=>setSc(window.scrollY>28);
    window.addEventListener("scroll",h);return()=>window.removeEventListener("scroll",h);
  },[]);
  useEffect(()=>{
    const obs=new IntersectionObserver(es=>{es.forEach(e=>{if(e.isIntersecting){e.target.classList.add("vis");obs.unobserve(e.target)}})},{threshold:.08});
    document.querySelectorAll(".au").forEach(el=>obs.observe(el));
    return()=>obs.disconnect();
  },[]);

  const to=id=>document.getElementById(id)?.scrollIntoView({behavior:"smooth"});

  const check=async()=>{
    setChk(true);
    await new Promise(r=>setTimeout(r,600));
    let f=ROOMS;
    if(rt!=="any")f=f.filter(r=>r.id===parseInt(rt));
    f=f.filter(r=>r.cap>=parseInt(gs));
    setRes(f);setChk(false);
    setTimeout(()=>document.getElementById("results")?.scrollIntoView({behavior:"smooth"}),100);
  };

  return(
    <div style={{background:"var(--bg)",color:"var(--tx)",minHeight:"100vh",fontFamily:"var(--sans)"}}>

      {/* NAV */}
      <nav style={{position:"fixed",top:0,left:0,right:0,zIndex:100,padding:"14px 48px",display:"flex",alignItems:"center",justifyContent:"space-between",transition:"all .3s",...(sc?{background:"rgba(7,9,14,.94)",backdropFilter:"blur(24px)",borderBottom:"1px solid rgba(200,169,110,.1)",boxShadow:"0 4px 28px rgba(0,0,0,.5)"}:{})}}>
        <div style={{display:"flex",alignItems:"center",gap:11,cursor:"pointer"}} onClick={()=>window.scrollTo({top:0,behavior:"smooth"})}>
          <div style={{width:40,height:40,position:"relative",overflow:"hidden",borderRadius:4,background:"#000",flexShrink:0}}>
            <img src={PIC.logo} alt="Logo" style={{...imgF,objectFit:"contain"}} onError={hide}/>
          </div>
          <span style={{fontFamily:"var(--serif)",fontSize:17,fontWeight:400,letterSpacing:".04em"}}>Hotel <em style={em}>Fountain</em></span>
        </div>
        <div className="nav-links" style={{display:"flex",alignItems:"center",gap:32}}>
          {[["ROOMS","rooms"],["EXPERIENCE","experience"],["AVAILABILITY","availability"],["CONTACT","contact"]].map(([l,id])=>(
            <button key={l} onClick={()=>to(id)} style={{background:"none",border:"none",color:"var(--tx3)",fontSize:9.5,letterSpacing:".2em",cursor:"pointer",fontFamily:"var(--sans)",fontWeight:300,transition:"color .18s"}}
              onMouseEnter={e=>e.target.style.color="var(--tx)"} onMouseLeave={e=>e.target.style.color="var(--tx3)"}>{l}</button>
          ))}
          <button style={{...gBtn,padding:"8px 18px",fontSize:9}} onClick={()=>window.open(CRM,"_blank")}>STAFF LOGIN</button>
        </div>
      </nav>

      {/* HERO SECTION - INTEGRATING (1) AND (2) */}
      <section style={{minHeight:"100vh",display:"flex",alignItems:"center",position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",inset:0,background:"linear-gradient(155deg,#0D1018,#07090E 45%,#0D0C08)"}}>
          <img src={PIC.hero} alt="Hotel Fountain" style={{...imgF,objectPosition:"center top"}} onError={hide}/>
          <div style={{position:"absolute",inset:0,background:"linear-gradient(to right,rgba(7,9,14,.92) 0%,rgba(7,9,14,.6) 55%,rgba(7,9,14,.2) 100%)"}}/>
        </div>
        <div className="hero-c" style={{position:"relative",zIndex:2,maxWidth:600,padding:"140px 48px 80px"}}>
          <div style={{fontSize:9.5,letterSpacing:".22em",color:"rgba(238,233,226,.45)",marginBottom:22,fontWeight:300}}>DHAKA, BANGLADESH</div>
          
          {/* CONTENT FROM (1) */}
          <h1 style={{fontFamily:"var(--serif)",fontSize:"clamp(52px,7.5vw,88px)",fontWeight:400,lineHeight:.97,letterSpacing:"-1px",marginBottom:8}}>Welcome to</h1>
          <h1 style={{fontFamily:"var(--serif)",fontStyle:"italic",fontSize:"clamp(52px,7.5vw,88px)",fontWeight:400,lineHeight:.97,letterSpacing:"-1px",color:"var(--gold)",marginBottom:24}}>Hotel Fountain</h1>
          <p style={{color:"rgba(238,233,226,.62)",lineHeight:1.82,maxWidth:440,marginBottom:36,fontSize:14,fontWeight:300}}>Premium Hospitality in Dhaka. Nestled in the heart of the city, we offer a sanctuary of refined comfort and luxury.</p>
          
          <div style={{display:"flex",gap:14,flexWrap:"wrap"}}>
            <button style={gBtn} onClick={()=>to("rooms")}>EXPLORE ROOMS</button>
            <button style={ghBtn} onClick={()=>to("availability")}>CHECK AVAILABILITY</button>
          </div>
        </div>
      </section>

      {/* ADDITIONAL SECTIONS (STATS, ROOMS, ETC) AS DEFINED IN (2) */}
      <div id="rooms" style={{maxWidth:1200,margin:"0 auto",padding:"88px 48px"}}>
        <span style={lbl}>— ACCOMMODATIONS</span>
        <h2 style={{...h2s,marginBottom:44}}>Our Rooms & Suites</h2>
        <div className="rooms-g" style={{display:"grid",gridTemplateColumns:"repeat(auto-fill, minmax(280px, 1fr))",gap:24}}>
          {ROOMS.map(rm=>(
            <div key={rm.id} style={{background:"var(--s1)",border:"1px solid var(--br2)",padding:"20px"}}>
              <h3 style={{fontFamily:"var(--serif)",fontSize:20,marginBottom:10}}>{rm.name}</h3>
              <p style={{fontSize:13,color:"var(--tx3)",marginBottom:20}}>{rm.desc}</p>
              <div style={{fontSize:18,color:"var(--gold)"}}>৳{rm.price.toLocaleString()} / night</div>
            </div>
          ))}
        </div>
      </div>

    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
