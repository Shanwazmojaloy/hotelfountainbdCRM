<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Fountain | Premium Booking</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: #d4af37; font-family: 'Playfair Display', serif; }
        .gold-border { border: 1px solid #d4af37; }
        .gold-bg { background-color: #d4af37; color: #000; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">
    <div class="max-w-4xl w-full gold-border p-8 rounded-lg bg-zinc-900/50 backdrop-blur-md">
        <h1 class="text-4xl font-serif mb-6 text-center tracking-widest uppercase">Check Availability</h1>
        
        <form id="bookingForm" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <input type="text" id="fullName" placeholder="Full Name" class="bg-transparent border-b border-gold-500 p-2 outline-none" required>
            <input type="text" id="phone" placeholder="Phone Number" class="bg-transparent border-b border-gold-500 p-2 outline-none" required>
            <input type="email" id="email" placeholder="Email Address" class="bg-transparent border-b border-gold-500 p-2 outline-none" required>
            <select id="roomType" class="bg-black border-b border-gold-500 p-2 outline-none">
                <option value="Standard">Standard Room</option>
                <option value="Deluxe">Deluxe Room</option>
                <option value="Suite">Royal Suite</option>
            </select>
            <input type="date" id="checkIn" class="bg-transparent border-b border-gold-500 p-2 outline-none md:col-span-2">
            
            <button type="submit" class="md:col-span-2 gold-bg font-bold py-4 px-8 mt-4 hover:bg-yellow-600 transition-all uppercase tracking-widest">
                Check Availability & Book
            </button>
        </form>
    </div>

    <script>
    document.getElementById('bookingForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const data = {
            guestName: document.getElementById('fullName').value,
            contact: document.getElementById('phone').value,
            email: document.getElementById('email').value,
            roomType: document.getElementById('roomType').value,
            date: document.getElementById('checkIn').value
        };

        try {
            const response = await fetch('https://hotelfountainbd-crm.vercel.app/api/bookings', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            if (response.ok) alert('Booking request sent to Hotel Fountain Front Desk!');
        } catch (err) {
            alert('Connected to CRM: Local testing mode active.');
        }
    });
    </script>
</body>
</html>
