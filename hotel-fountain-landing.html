<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Fountain | Premium Stay</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass { background: rgba(13, 148, 136, 0.15); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        body { background: radial-gradient(circle at top left, #042f2e, #020617); }
    </style>
</head>
<body class="min-h-screen text-white flex flex-col items-center justify-center p-6 font-sans">
    <div class="glass p-10 rounded-3xl shadow-2xl text-center max-w-2xl w-full">
        <h1 class="text-5xl font-bold mb-4 bg-clip-text text-transparent bg-gradient-to-r from-teal-400 to-emerald-200">Hotel Fountain</h1>
        <p class="text-teal-100/70 mb-8 text-lg">Excellence in Hospitality & Management.</p>
        
        <div class="flex flex-col gap-4">
            <a href="/crm" class="bg-teal-600 hover:bg-teal-500 text-white font-bold py-4 px-8 rounded-xl transition-all transform hover:scale-105 shadow-[0_0_20px_rgba(20,184,166,0.4)]">
                Open CRM Dashboard
            </a>
            <p class="text-xs text-teal-500/50 uppercase tracking-widest mt-4">Authorized Staff Access Only</p>
        </div>
    </div>

</html>
