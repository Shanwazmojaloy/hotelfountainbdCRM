name = "email-reply-intake"
main = "email-reply-intake.js"
compatibility_date = "2024-01-01"

# Email Worker binding — required for receiving inbound emails
[email]
  # No additional config needed here; routing rules set in CF Dashboard

# Build — postal-mime must be bundled
[build]
  command = "npm install"

[[rules]]
  type = "ESModule"
  globs = ["**/*.js"]
